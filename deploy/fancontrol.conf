# Temperature source: "nvidia-smi" or a sysfs hwmon path (millidegrees)
temp_source = nvidia-smi

# GPU index passed to `nvidia-smi --id=N`. Required on multi-GPU systems.
# Omit on single-GPU systems — the program will fail hard if nvidia-smi
# reports more than one GPU and this is not set.
#gpu_index = 0

# Fan PWM control file (0-255). The _enable file is derived automatically.
fan_pwm = /sys/class/hwmon/hwmon3/pwm4

# Fan RPM sensor (optional, for logging)
fan_rpm = /sys/class/hwmon/hwmon3/fan4_input

# Poll interval in seconds
interval = 3

# Fan curve: temperature (°C) = PWM value (0-255)
# Linear interpolation between points. Sorted by temperature.
[curve]
30 = 60
40 = 80
50 = 120
60 = 140
70 = 160
80 = 180
85 = 200
90 = 230
95 = 255
